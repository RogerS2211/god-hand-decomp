# God Hand (USA) — SLUS-21503 — splat config
# Targets the **loaded image** of the main EE ELF (single LOAD program header,
# covering .text .data .sndata .rodata .gcc_except_table .sbss .bss).
#
# Non-loaded sections (.reginfo, .mdebug.eabi64, .DVP.ovlytab, .DVP.ovlystrtab,
# and 39× .DVP.overlay[N]) are not part of the .rom blob and are extracted
# separately by scripts/extract_elf_metadata.py into bin/elf_metadata/.
# They will be re-glued by the link step.
#
# Generated by `splat create_config` 2026-05-15 then hand-edited.

name: God Hand (USA, SLUS-21503)
sha1: 2a81167afa727a9e4293803a8139192e87cfdf17  # of the .rom (loaded image), not the ELF

options:
  basename: SLUS_215.03
  target_path: build/SLUS_215.03.rom
  elf_path: build/SLUS_215.03.elf
  # base_path defaults to dir of this yaml (config/); use repo root.
  base_path: ..
  platform: ps2
  compiler: EEGCC

  # _gp_ register value — runtime resolves to &_SBSS_START + 0x7FF0
  gp_value: 0x00468CF0
  ld_gp_expression: cod_SBSS_START + 0x7FF0

  asm_path: asm
  src_path: src
  build_path: build

  ld_script_path: config/SLUS_215.03.ld
  ld_dependencies: True
  ld_wildcard_sections: True
  ld_bss_contains_common: True

  create_asm_dependencies: True

  find_file_boundaries: False
  o_as_suffix: True

  symbol_addrs_path:
    - config/symbol_addrs.txt
  reloc_addrs_path:
    - config/reloc_addrs.txt

  undefined_funcs_auto_path: config/undefined_funcs_auto.txt
  undefined_syms_auto_path: config/undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  # Do NOT regenerate the include/ asm-macro files on every split. A
  # preflight customized include/include_asm.h with
  # `.pushsection .text.<NAME> ... .popsection` brackets (so per-function
  # carves land at distinct virtual addresses; splat's default bare
  # `.section .text` collapses every INCLUDE_ASM'd function into the first
  # carve slot), and include/labels.inc drops the ee-as-2.10-incompatible
  # `.aent` pseudo-op (commit 60dc443). With generation enabled splat
  # silently reverts both surfaces and breaks the build. r207.yaml already
  # disables this; the main split must too. See scripts/resplat.sh.
  generate_asm_macros_files: False

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  named_regs_for_c_funcs: False

  # .sndata is the SN-Systems-linker small-data section, distinct from .data.
  # We declare it in section_order so the linker emits it as its own section
  # at vaddr 0x0040A400, but represent it as a `data` subsegment with
  # linker_section: .sndata override (splat has no built-in sndata type).
  section_order:
    - .text
    - .data
    - .sndata
    - .rodata
    - .gcc_except_table
    - .sbss
    - .bss

  auto_link_sections:
    - .data
    - .sndata
    - .rodata
    - .gcc_except_table
    - .sbss
    - .bss

segments:
  - name: cod
    type: code
    start: 0x000000
    vram: 0x00100000
    # bss_size = .sbss (0xc0) padded to 0x100 + .bss (0x3259b4) padded to alignment.
    # splat's create_config computed 0x325A74; verified against readelf.
    bss_size: 0x325A74
    subalign: null
    subsegments:
      - [0x000000, asm, cod/000000]      # .text   @ vaddr 0x00100000, 0x2BBF20 bytes
      - [0x2BBF80, data, cod/2BBF80]     # .data   @ vaddr 0x003BBF80, 0x4E460 bytes
      - [0x30A400, sndata, cod/30A400]   # .sndata @ vaddr 0x0040A400, 0x11170 bytes (SN Systems small-data; tools/splat_ext/sndata.py)
      - [0x31B580, rodata, cod/31B580]   # .rodata @ vaddr 0x0041B580, 0x45620 bytes
      - [0x360C00, gcc_except_table, cod/360C00]   # .gcc_except_table @ vaddr 0x00460C00, 0xE4 bytes
      - { type: sbss, vram: 0x00460D00, name: cod/00460D00 }   # .sbss @ 0xC0 bytes
      - { type: bss,  vram: 0x00460E00, name: cod/00460E00 }   # .bss  @ 0x3259B4 bytes
  - [0x360CE4]   # end-of-rom marker
