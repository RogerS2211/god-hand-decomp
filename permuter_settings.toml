# decomp-permuter / decomp.me settings for god-hand-decomp.
#
# Read by `tools/decomp-permuter/import.py`, which prepares a scratch
# directory and shells out to permuter.py.
#
# Compiler: ee-gcc 2.96 (SCE PS2 SDK 3.0.20).
# decomp.me preset `ee-gcc2.96` is verified retail-byte-equal by the
# cc-roundtrip probes.
# Wrapper: scripts/ee-cc-wrap.py (the upstream `ee-gcc` driver
# segfaults on this host; the wrapper invokes cpp0 + cc1 + ee-as
# directly, byte-equivalent output).

# decomp-permuter's randomization-weight table.  "gcc" matches our
# `ee-gcc 2.96` toolchain; explicitly set rather than inferred-from-target
# (the platform target `ps2` would otherwise infer `ido`, which is wrong
# for our SCE-on-EE toolchain).
compiler_type = "gcc"

# Import-time build line.  Mirrors `compile_config.json::c_flags` +
# `as_flags` + `include_dirs`.  `import.py` shlex-splits this and then
# appends "$INPUT" -o "$OUTPUT" to form the actual compile command.
compiler_command = "scripts/ee-cc-wrap.py -c -O2 -G0 -I include -I include/sce"
assembler_command = "mipsel-linux-gnu-as -EL -march=r5900 -mabi=eabi -G0 --no-pad-sections"

# Map our local compiler driver path (compiler[0] from compiler_command,
# above) to the decomp.me compiler preset id.  fnmatch wildcards are
# supported per `tools/decomp-permuter/import.py::get_decompme_compiler_name`.
# The preset id `ee-gcc2.96` is published by `decompme/compilers` and
# matches the upstream Dockerfile at platforms/ps2/ee-gcc2.96/.
[decompme.compilers]
"scripts/ee-cc-wrap.py" = "ee-gcc2.96"
"*ee-cc-wrap.py" = "ee-gcc2.96"
